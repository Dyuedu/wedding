<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo link thiệp mời</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #272023;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 255, 255, .9), transparent 18%),
        radial-gradient(circle at 82% 3%, rgba(246, 174, 193, .45), transparent 22%),
        linear-gradient(180deg, #fdeef2 0%, #fff8fa 48%, #fdeaf0 100%);
      min-height: 100vh;
    }

    .link-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .link-maker {
      width: min(420px, 100%);
      padding: 28px 22px;
      background: rgba(255, 247, 249, .92);
      border: 1px solid rgba(223, 135, 156, .28);
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(157, 82, 102, .18);
    }

    .script {
      margin: 0 0 26px;
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      line-height: 1;
      color: #2a2023;
      font-weight: 400;
      text-align: center;
    }

    .link-maker label {
      display: block;
      margin-bottom: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: #4b3141;
    }

    .link-maker label:not(:first-of-type) {
      margin-top: 14px;
    }

    .link-maker input,
    .link-maker select,
    .link-maker textarea {
      width: 100%;
      border: 1px solid #f0b7c5;
      border-radius: 8px;
      padding: 12px 14px;
      font: 14px Inter, sans-serif;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .link-maker textarea {
      min-height: 96px;
      margin-top: 14px;
      resize: vertical;
    }

    .time-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .link-maker button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 12px;
      background: #d87994;
      color: #fff;
      font: 600 14px Inter, sans-serif;
      cursor: pointer;
    }

    .link-maker button:last-child {
      background: #4b3141;
    }
  </style>
</head>
<body>
  <main class="link-page">
    <section class="link-maker">
      <p class="script">Tạo link thiệp mời</p>
      <label for="placeSelect">Nhà mời</label>
      <select id="placeSelect">
        <option value="nhatrai">Nhà trai</option>
        <option value="nhagai">Nhà gái</option>
      </select>
      <label for="guestInput">Tên khách mời</label>
      <input id="guestInput" type="text" placeholder="Ví dụ: Anh Nguyễn Văn A" autocomplete="off" />
      <label for="eventHourInput">Thời gian tiệc</label>
      <div class="time-fields">
        <input id="eventHourInput" type="number" min="0" max="23" placeholder="Giờ" autocomplete="off" />
        <input id="eventMinuteInput" type="number" min="0" max="59" placeholder="Phút" autocomplete="off" />
      </div>
      <label for="eventDayInput">Ngày tiệc</label>
      <input id="eventDayInput" type="number" min="6" max="7" placeholder="06 hoặc 07" autocomplete="off" />
      <button id="makeLink" type="button">Tạo link</button>
      <textarea id="guestLink" readonly placeholder="Link sẽ hiện ở đây"></textarea>
      <button id="copyLink" type="button">Copy link</button>
    </section>
  </main>

  <script>
    const input = document.getElementById('guestInput');
    const placeSelect = document.getElementById('placeSelect');
    const eventHourInput = document.getElementById('eventHourInput');
    const eventMinuteInput = document.getElementById('eventMinuteInput');
    const eventDayInput = document.getElementById('eventDayInput');
    const output = document.getElementById('guestLink');
    const makeButton = document.getElementById('makeLink');
    const copyButton = document.getElementById('copyLink');
    const invitationUrl = 'https://thanhyen.io.vn/';

    function makeGuestLink() {
      const guest = input.value.trim();
      const url = new URL(invitationUrl);
      url.searchParams.set('p', placeSelect.value);
      if (guest) url.searchParams.set('guest', guest);
      const eventHour = eventHourInput.value.trim();
      const eventMinute = eventMinuteInput.value.trim();
      const eventDay = eventDayInput.value.trim();
      if (eventHour) url.searchParams.set('eventHour', eventHour);
      if (eventMinute) url.searchParams.set('eventMinute', eventMinute.padStart(2, '0'));
      if (eventDay) url.searchParams.set('eventDay', eventDay.padStart(2, '0'));
      output.value = url.href;
    }

    makeButton.addEventListener('click', makeGuestLink);
    input.addEventListener('input', makeGuestLink);
    placeSelect.addEventListener('change', makeGuestLink);
    eventHourInput.addEventListener('input', makeGuestLink);
    eventMinuteInput.addEventListener('input', makeGuestLink);
    eventDayInput.addEventListener('input', makeGuestLink);
    copyButton.addEventListener('click', async () => {
      if (!output.value) makeGuestLink();
      if (navigator.clipboard) {
        await navigator.clipboard.writeText(output.value);
      } else {
        output.select();
        document.execCommand('copy');
      }
      copyButton.textContent = 'Đã copy';
      setTimeout(() => {
        copyButton.textContent = 'Copy link';
      }, 1400);
    });
  </script>
</body>
</html>
